<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>



    <!-- As a heading -->
    <nav class="navbar navbar-dark bg-primary text-light w-100 py-md-5 py-4">
        <div class="d-flex ps-3 flex-column flex-md-row gap-1 align-items-center">
            <h1 class="navbar-brand fw-bold fs-2 m-0 h1 ">Selamat Datang Admin</h1>
            <p class="m-0 fs-5">- Layanan Laporan Masyarakat</p>
        </div>
    </nav>

    <!-- SideBar -->
    <div class="d-flex">
        <ul class="nav sidebar shadow bg-white flex-column  gap-3 pt-4 text-white" style="width: 16rem">
            <li class="nav-item ms-2 ">
                <a class="nav-link active " aria-current="page" href="#"><i class="bi bi-speedometer2"></i>
                    Dashboard</a>
                <hr class="bg-secondary">
            </li>

            <li class="nav-item ms-2">
                <a class="nav-link" href="#"><i class="bi bi-pencil-square me-2"></i> Laporan</a>
                <hr class="bg-secondary">
            </li>
            <li class="nav-item  ms-2">
                <a class="nav-link" href="#"><i class="bi bi-person-circle me-2"></i> Akun Saya</a>
                <hr class="bg-secondary">
            </li>

        </ul>


        <!-- Konten utama DashBoard -->
        <div class="container mb-0 p-0">
            <!-- Row utama untuk chart + cards -->
            <div class="row text-white  m-0 px-3 g-3  ">
                <!-- Grafik Chart -->
                <div class="chart mb-3">
                    <canvas id="myChart"></canvas>
                </div>
                <!-- Wrap-Crad -->
                <div class="wrap-card row gap-3 mb-3 m-0 g-0">
                    <!-- Card 1 -->
                    <div class="col-md-auto col-12 ">
                        <div class="card wrap1 bg-info">
                            <div class="card-body">
                                <h5 class="card-title fw-bold">SEMUA LAPORAN</h5>
                                <div class="display-4 fw-bold">106</div>
                                <p class="card-text">Lihat Selengkapnya </p>
                            </div>
                        </div>
                    </div>
                    <!-- Card 2 -->
                    <div class="col-md-auto col-12">
                        <div class="card wrap2 bg-info">
                            <div class="card-body">
                                <h5 class="card-title fw-bold"> LAPORAN SELESAI</h5>
                                <div class="display-4 fw-bold">106</div>
                                <p class="card-text">Lihat Selengkapnya </p>
                            </div>
                        </div>
                    </div>
                    <!-- Card 3 -->
                    <div class="col-md-auto col-12">
                        <div class="card wrap3 bg-info">
                            <div class="card-body">
                                <h5 class="card-title fw-bold">LAPORAN DI PROSES</h5>
                                <div class="display-4  fw-bold">106</div>
                                <p class="card-text">Lihat Selengkapnya </p>
                            </div>
                        </div>
                    </div>
                    <!-- Card 4 -->
                    <div class="col-md-auto col-12">
                        <div class="card wrap4 bg-info">
                            <div class="card-body">
                                <h5 class="card-title fw-bold">LAPORAN HARI INI</h5>
                                <div class="display-4  fw-bold">106</div>
                                <p class="card-text">Lihat Selengkapnya </p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            <!-- Nav Bottom(Mobile) -->
            <div class="nav-bottom justify-content-center">
                <ul class="nav justify-content-between px-3 bg-white text-primary align-items-center gap-3 h-100">
                    <li class="nav-item">
                        <a class="nav-link active d-flex flex-column align-items-center" aria-current="page"
                            href="index.html"><i class="bi bi-speedometer2 "></i>
                            Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex flex-column align-items-center" href="laporan.html"><i
                                class="bi bi-pencil-square me-2"></i> Laporan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex flex-column align-items-center" href="profil.html"><i
                                class="bi bi-person-circle me-2"></i> Akun Saya</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Boostrap.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script>
        //Script chart
        const ctx = document.getElementById('myChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                datasets: [{
                    label: '# of Votes',
                    data: [12, 19, 3, 5, 2, 3],
                    borderWidth: 1
                }]
            },
            options: {
                maintainAspectRatio: false,
                responsive: true, // matikan responsive
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>

</body>

</html>
